{% for field in form %}
  <div class="form-field {% if field.field.widget.input_type == 'checkbox' and not field.field.widget.allow_multiple_selected %}form-field--checkbox{% endif %}">
    {% if field.field.widget.input_type == 'checkbox' and not field.field.widget.allow_multiple_selected %}
      <label>
        {{ field }}
        <span>{{ field.label }}</span>
      </label>
    {% else %}
      <label for="{{ field.id_for_label }}">{{ field.label }}</label>
      {{ field }}
    {% endif %}
    {% if field.help_text %}<p class="help-text">{{ field.help_text }}</p>{% endif %}
    {% if field.errors %}<div class="field-errors" role="alert">{{ field.errors }}</div>{% endif %}
  </div>
{% endfor %}
