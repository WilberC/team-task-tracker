<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="Sharp by default — 2 px is canonical" viewport="700x180" -->
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Radii</title>
</head>
<body>
  <div class="row" style="justify-content: space-between;">
    <div class="label">Corner radii · sharp by default</div>
    <div class="mono">--radius-*</div>
  </div>
  <div class="row" style="gap:16px; align-items:flex-end;">
    <div class="col" style="align-items:center;">
      <div style="background:#0E1014; width:80px; height:60px; border-radius:0;"></div>
      <div class="name" style="font-weight:600; font-size:12px;">0 · square</div>
      <div class="val mono">--radius-0</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="background:#0E1014; width:80px; height:60px; border-radius:2px;"></div>
      <div class="name" style="font-weight:600; font-size:12px;">2 · default</div>
      <div class="val mono">--radius-1</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="background:#0E1014; width:80px; height:60px; border-radius:4px;"></div>
      <div class="name" style="font-weight:600; font-size:12px;">4</div>
      <div class="val mono">--radius-2</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="background:#0E1014; width:80px; height:60px; border-radius:8px;"></div>
      <div class="name" style="font-weight:600; font-size:12px;">8</div>
      <div class="val mono">--radius-3</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="background:#0E1014; width:80px; height:60px; border-radius:12px;"></div>
      <div class="name" style="font-weight:600; font-size:12px;">12</div>
      <div class="val mono">--radius-4</div>
    </div>
    <div class="col" style="align-items:center;">
      <div style="background:#0E1014; width:120px; height:32px; border-radius:999px;"></div>
      <div class="name" style="font-weight:600; font-size:12px;">pill · chips only</div>
      <div class="val mono">--radius-pill</div>
    </div>
  </div>
</body>
</html>
