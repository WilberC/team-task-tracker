<!doctype html>
<!-- @dsCard group="Components" name="Navbar" subtitle="Sticky header · backdrop blur on scroll" viewport="1100x110" -->
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Navbar</title>
<style>
  .nav {
    background: rgb(246 244 240 / 0.85);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid #D2D6DD;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-radius: 2px;
  }
  .links { display:flex; gap:28px; }
  .links a { font-family:var(--font-body); font-size:14px; font-weight:600; color:#0E1014; text-decoration:none; padding:6px 0; position:relative;}
  .links a.active::after { content:""; position:absolute; left:0; right:0; bottom:0; height:2px; background:#E8732C; }
  .links a:hover { color:#3D434E; }
  .right { display:flex; gap:10px; align-items:center; }
  .btn { font-family: var(--font-body); font-weight:700; font-size:13px; padding:10px 18px; border-radius:2px; border:0; cursor:pointer; }
  .btn-primary { background:#E8732C; color:#fff; }
  .btn-ghost { background:transparent; color:#0E1014; border:1px solid #D2D6DD; }
</style>
</head>
<body style="padding:18px 18px;">
  <div class="row" style="justify-content: space-between;">
    <div class="label">Navbar · sticky header with backdrop blur on scroll</div>
    <div class="mono">ui/Navbar</div>
  </div>
  <div class="nav">
    <img src="../assets/logo-placeholder.svg" alt="Jawinsa" style="height:34px;" />
    <div class="links">
      <a href="#" class="active">Servicios</a>
      <a href="#">Industrial</a>
      <a href="#">Nosotros</a>
      <a href="#">Noticias</a>
      <a href="#">Contacto</a>
    </div>
    <div class="right">
      <button class="btn btn-ghost">Llamar</button>
      <button class="btn btn-primary">Cotizar</button>
    </div>
  </div>
</body>
</html>
