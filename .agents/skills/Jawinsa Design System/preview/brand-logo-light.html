<!doctype html>
<!-- @dsCard group="Brand" name="Logo · light" subtitle="Placeholder wordmark — replace with real logo" viewport="700x180" -->
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Logo</title>
</head>
<body>
  <div class="row" style="justify-content: space-between;">
    <div class="label">Logo placeholder · light surface</div>
    <div class="mono">assets/logo-placeholder.svg</div>
  </div>
  <div style="display:grid; grid-template-columns: 2fr 1fr; gap:12px; align-items:stretch;">
    <div style="background:#F6F4F0; border:1px solid #D2D6DD; padding:24px 28px; display:flex; align-items:center; border-radius:2px;">
      <img src="../assets/logo-placeholder.svg" alt="Jawinsa" style="height:64px;" />
    </div>
    <div style="background:#fff; border:1px solid #D2D6DD; padding:18px; display:flex; flex-direction:column; gap:8px; border-radius:2px;">
      <div style="font-family:var(--font-mono); font-size:11px; color:#6E7682;">⚠ Placeholder</div>
      <div style="font-family:var(--font-body); font-size:13px; line-height:1.4; color:#0E1014;">El logo real no llegó al proyecto. Este wordmark es temporal y respeta el sistema tipográfico.</div>
      <div style="font-family:var(--font-body); font-size:12px; color:#3D434E;">Reemplazar el archivo en <span class="mono">assets/</span> manteniendo el nombre.</div>
    </div>
  </div>
</body>
</html>
