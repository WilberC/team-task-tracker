<!doctype html>
<!-- @dsCard group="Spacing" name="Shadows · elevation" subtitle="Three tight, warm levels" viewport="700x200" -->
<html lang="es">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="_card.css" />
<title>Shadows</title>
<style>
  .elev {
    background: #fff;
    width: 100%;
    height: 76px;
    border-radius: 2px;
    border: 1px solid rgb(14 16 20 / 0.06);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-size: 11px;
    color: #535A66;
  }
  .e1 { box-shadow: 0 1px 2px rgb(14 16 20 / 0.06), 0 1px 1px rgb(14 16 20 / 0.04); }
  .e2 { box-shadow: 0 6px 16px -4px rgb(14 16 20 / 0.10), 0 2px 4px rgb(14 16 20 / 0.06); }
  .e3 { box-shadow: 0 24px 48px -12px rgb(14 16 20 / 0.18), 0 8px 16px rgb(14 16 20 / 0.08); }
</style>
</head>
<body style="padding: 28px 24px;">
  <div class="row" style="justify-content: space-between;">
    <div class="label">Elevation · tight, warm shadows</div>
    <div class="mono">--shadow-1 / -2 / -3</div>
  </div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px;">
    <div class="col">
      <div class="elev e1">rest</div>
      <div class="name" style="font-weight:600; font-size:12px;">Shadow 1</div>
      <div class="mono">cards at rest</div>
    </div>
    <div class="col">
      <div class="elev e2">hover</div>
      <div class="name" style="font-weight:600; font-size:12px;">Shadow 2</div>
      <div class="mono">hover, dropdowns</div>
    </div>
    <div class="col">
      <div class="elev e3">modal</div>
      <div class="name" style="font-weight:600; font-size:12px;">Shadow 3</div>
      <div class="mono">modals, popovers</div>
    </div>
  </div>
</body>
</html>
