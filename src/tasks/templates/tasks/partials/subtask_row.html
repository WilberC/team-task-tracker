<tr id="subtask-row-{{ subtask.pk }}">
  <td><strong>{{ subtask.title }}</strong></td>
  <td>
    {% if subtask.assigned_employee %}
      {{ subtask.assigned_employee.full_name }}
    {% else %}
      {{ subtask.assigned_team.name }}
    {% endif %}
  </td>
  <td>
    <span class="status-badge status-badge--{{ subtask.status }}">
      {{ subtask.get_status_display }}
    </span>
  </td>
  <td>{{ subtask.due_date|date:"d/m/Y" }}</td>
  <td class="table-actions">
    <div class="button-row">
      <button
        class="button button--secondary"
        type="button"
        hx-get="{% url 'tasks:edit' subtask.pk %}?inline=1"
        hx-target="#subtask-row-{{ subtask.pk }}"
        hx-swap="outerHTML"
      >
        <span data-lucide="pencil" aria-hidden="true"></span>
        Editar
      </button>
      <a class="button button--secondary" href="{% url 'tasks:detail' subtask.pk %}">
        <span data-lucide="folder-open" aria-hidden="true"></span>
        Abrir
      </a>
    </div>
  </td>
</tr>
