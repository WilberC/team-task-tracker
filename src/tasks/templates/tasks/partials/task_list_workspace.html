<div id="task-workspace">
  <form
    class="filter-panel"
    method="get"
    action="{% url 'tasks:list' %}"
    hx-get="{% url 'tasks:list' %}"
    hx-target="#task-workspace"
    hx-swap="outerHTML"
    hx-push-url="true"
    hx-trigger="change delay:200ms, submit"
  >
    {% for field in filter_form %}
      <div class="form-field{% if field.field.widget.input_type == 'checkbox' %} form-field--checkbox{% endif %}">
        <label for="{{ field.id_for_label }}">{{ field.label }}</label>
        {{ field }}
      </div>
    {% endfor %}
    <div class="filter-panel__actions{% if has_active_filters %} filter-panel__actions--active{% endif %}">
      {% if has_active_filters %}<span class="filter-panel__status">Filtros activos</span>{% endif %}
      <button class="button button--primary" type="submit">
        <span data-lucide="filter" aria-hidden="true"></span>
        Filtrar
      </button>
      {% if has_active_filters %}
        <a
          class="button button--secondary"
          href="{% url 'tasks:list' %}"
          hx-get="{% url 'tasks:list' %}"
          hx-target="#task-workspace"
          hx-swap="outerHTML"
          hx-push-url="true"
        >
          <span data-lucide="x" aria-hidden="true"></span>
          Limpiar
        </a>
      {% endif %}
    </div>
  </form>

  {% include "tasks/partials/task_table.html" %}
</div>
